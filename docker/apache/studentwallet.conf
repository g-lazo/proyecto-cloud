<VirtualHost *:80>
    DocumentRoot /var/www/html/public

    <Directory /var/www/html/public>
        AllowOverride All
        Require all granted
        Options -Indexes
    </Directory>

    # Bloqueo redundante a directorios sensibles
    <Directory /var/www/html/config>
        Require all denied
    </Directory>
    <Directory /var/www/html/vendor>
        Require all denied
    </Directory>
    <Directory /var/www/html/db>
        Require all denied
    </Directory>
    <Directory /var/www/html/docker>
        Require all denied
    </Directory>
    <Directory /var/www/html/infra>
        Require all denied
    </Directory>
    <Directory /var/www/html/lambda>
        Require all denied
    </Directory>
    <Directory /var/www/html/templates>
        Require all denied
    </Directory>

    Header always set X-Content-Type-Options "nosniff"
    Header always set X-Frame-Options "DENY"
    Header always set Referrer-Policy "same-origin"
    Header unset X-Powered-By
    Header always unset Server

    ErrorLog /var/log/apache2/sw-error.log
    CustomLog /var/log/apache2/sw-access.log combined
</VirtualHost>
